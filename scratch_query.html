<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Query Results</h1>
  <pre id="output">Loading...</pre>

  <script>
    const SUPABASE_URL = 'https://vpbhqemomsewrnrggbmd.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_si2F2abcWGL6uaq9FueJ0Q_eE5nkol3';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function run() {
      try {
        const { data: userSls } = await db.from('user_sls').select('*').limit(5);
        const { data: pmlPpl } = await db.from('pml_ppl').select('*').limit(5);
        const { data: batches } = await db.from('upload_batches').select('*').limit(5);
        const { data: anomali } = await db.from('assignment_anomali').select('*').limit(5);
        const { data: profiles } = await db.from('profiles').select('id, sobatid, nama, role').limit(5);

        document.getElementById('output').textContent = JSON.stringify({
          user_sls: userSls || [],
          pml_ppl: pmlPpl || [],
          upload_batches: batches || [],
          assignment_anomali: anomali || [],
          profiles: profiles || []
        }, null, 2);
      } catch (e) {
        document.getElementById('output').textContent = e.message;
      }
    }
    run();
  </script>
</body>
</html>
